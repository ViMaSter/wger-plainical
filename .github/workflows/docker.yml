#  https://docs.docker.com/build/ci/github-actions/multi-platform/
name: Build and push production Docker images (GHCR only)

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/server

jobs:
  ghcr:
    name: Build and push GHCR multi-arch image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta (GHCR)
        id: meta
        uses: docker/metadata-action@v5
        with:
          tags: |
            type=raw,value=latest
            type=raw,value=2.4-dev
          images: |
            ${{ env.GHCR_IMAGE }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build date
        run: echo "BUILD_DATE=$(date -u +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Build and push GHCR image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: extras/docker/production/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ env.BUILD_DATE }}
            BUILD_COMMIT=${{ github.sha }}

          # Optional local cache (kept simple since single job)
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect GHCR image
        run: |
          docker buildx imagetools inspect ghcr.io/vimaster/server:${{ steps.meta.outputs.version }}
